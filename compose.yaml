services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-cv-job-matcher:local
    ports:
      - "8000:8000"
    init: true
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
