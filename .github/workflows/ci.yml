name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      AI_PROVIDER: mock
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o-mini
      LOG_LEVEL: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -v

  docker:
    name: Docker build and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build --tag ai-cv-job-matcher:ci .

      - name: Verify non-root user
        run: |
          user_info="$(docker run --rm --entrypoint id ai-cv-job-matcher:ci)"
          echo "$user_info"
          if echo "$user_info" | grep -q 'uid=0(root)'; then
            echo "Container runs as root"
            exit 1
          fi

      - name: Start container
        run: |
          docker run \
            --detach \
            --name ai-cv-job-matcher-ci \
            --publish 8000:8000 \
            --env AI_PROVIDER=mock \
            --env LOG_LEVEL=INFO \
            ai-cv-job-matcher:ci

      - name: Smoke test health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              echo "Health check passed on attempt ${attempt}"
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed after 30 attempts"
          docker logs ai-cv-job-matcher-ci || true
          exit 1

      - name: Show container logs
        if: always()
        run: docker logs ai-cv-job-matcher-ci || true

      - name: Remove container
        if: always()
        run: docker rm --force ai-cv-job-matcher-ci || true
